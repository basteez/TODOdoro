<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>tododoro</title>
  </head>
  <body>
    <script>
      // Synchronous theme application to prevent flash of wrong theme
      try {
        var s = localStorage.getItem('tododoro-settings');
        if (s) {
          var p = JSON.parse(s);
          var t = p && p.state && p.state.theme;
          if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          } else if (t === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      } catch (e) {}
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
